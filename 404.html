<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - visualsbytom</title>
    <style>
        body {
            background-color: #0f0f0f; /* Sleek dark background */
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -5px;
            background: linear-gradient(to right, #ffffff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            color: #888;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 40px;
        }

        .btn {
            text-decoration: none;
            color: #000;
            background-color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>404 ERROR</h2>
        <p>Page Not Found or Under Maintenance</p>
        <a href="/" class="btn">RETURN HOME</a>
    </div>

</body>
</html>
